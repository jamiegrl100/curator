YAMLname: Bug Reportdescription: Report a reproducible problem in Curator Enginetitle: "[Bug]: "labels: ["bug"]body:  - type: markdown    attributes:      value: |        Thanks for reporting a bug. Please include as much detail as possible.  - type: textarea    id: what-happened    attributes:      label: What happened?      description: Describe the bug clearly.      placeholder: "When I click..., I expected..., but..."    validations:      required: true  - type: textarea    id: steps    attributes:      label: Steps to reproduce      description: Provide step-by-step instructions.      placeholder: |        1. Go to ...        2. Click ...        3. See error ...    validations:      required: true  - type: textarea    id: expected    attributes:      label: Expected behavior      placeholder: "I expected..."    validations:      required: true  - type: textarea    id: logs    attributes:      label: Logs / error output      description: Paste relevant logs. Remove secrets.      render: shell    validations:      required: false  - type: input    id: version    attributes:      label: Curator version      placeholder: "e.g., 0.4.0"    validations:      required: true  - type: dropdown    id: server    attributes:      label: Web server      options:        - Apache        - Nginx        - Other    validations:      required: true  - type: input    id: php    attributes:      label: PHP version      placeholder: "e.g., 8.2"    validations:      required: false  - type: input    id: db    attributes:      label: MySQL/MariaDB version      placeholder: "e.g., MariaDB 10.5"    validations:      required: falseCopy
