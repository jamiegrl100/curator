name: Question
description: Ask a question about usage or development
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "How do I..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do? Include version and environment.
      placeholder: "Curator version, OS, PHP, DB..."
    validations:
      required: false
