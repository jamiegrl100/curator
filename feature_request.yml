name: Feature Request
description: Suggest an improvement or new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: "It’s hard to..., because..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Curator to do?
      placeholder: "Add a way to..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "I tried..., but..."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: "Mockups, examples, related projects..."
    validations:
      required: false
